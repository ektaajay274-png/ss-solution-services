<!DOCTYPE html>
<html>
<head>
<title>SS Solution Services - Apply Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#002b5c;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#28a745;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

#payment, #success{
display:none;
}

</style>
</head>

<body>

<div class="header">
SS Solution Services Apply Form
</div>

<div class="container">

<!-- FORM -->
<div id="formSection" class="section">

<h3>Fill Your Details</h3>

<input id="name" placeholder="Full Name">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">

<label>Date of Birth</label>
<input type="date" id="dob">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="qualification" placeholder="Qualification">

<select id="company">
<option>Amazon</option>
<option>JCB</option>
<option>Other</option>
</select>

<input id="location" placeholder="Job Location">
<input id="experience" placeholder="Experience (if any)">

<label>Aadhaar Front</label>
<input type="file">

<label>Aadhaar Back</label>
<input type="file">

<label>Resume / Marksheet</label>
<input type="file">

<button onclick="nextStep()">Next → Payment</button>

</div>

<!-- PAYMENT -->
<div id="payment" class="section">

<h3>Payment</h3>

<p>Registration Fee: ₹199</p>

<a href="upi://pay?pa=9509299870@ybl&pn=SS%20Solution%20Services&am=199" target="_blank">
<button>Pay Now (UPI)</button>
</a>

<br><br>

<button onclick="submitForm()">Submit After Payment</button>

</div>

<!-- SUCCESS -->
<div id="success" class="section">

<h3>Application Submitted ✅</h3>

<div id="finalData"></div>

</div>

</div>

<script>

let userData = {};

function nextStep(){

userData.name = document.getElementById("name").value;
userData.father = document.getElementById("father").value;
userData.mother = document.getElementById("mother").value;
userData.dob = document.getElementById("dob").value;
userData.gender = document.getElementById("gender").value;
userData.qualification = document.getElementById("qualification").value;
userData.company = document.getElementById("company").value;
userData.location = document.getElementById("location").value;
userData.exp = document.getElementById("experience").value;

document.getElementById("formSection").style.display="none";
document.getElementById("payment").style.display="block";

}

function submitForm(){

document.getElementById("payment").style.display="none";
document.getElementById("success").style.display="block";

document.getElementById("finalData").innerHTML = `
<b>Name:</b> ${userData.name}<br>
<b>Father:</b> ${userData.father}<br>
<b>Mother:</b> ${userData.mother}<br>
<b>DOB:</b> ${userData.dob}<br>
<b>Gender:</b> ${userData.gender}<br>
<b>Qualification:</b> ${userData.qualification}<br>
<b>Company:</b> ${userData.company}<br>
<b>Location:</b> ${userData.location}<br>
<b>Experience:</b> ${userData.exp}<br><br>

<b>SS Solution Services</b>
`;

}

</script>

</body>
</html>
