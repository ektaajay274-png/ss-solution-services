<!DOCTYPE html>
<html>
<head>
<title>SS Solution Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f1f1f1}

/* NAVBAR */
.nav{
background:#0a1f44;
color:white;
display:flex;
justify-content:space-around;
padding:12px;
position:sticky;top:0;
z-index:1000;
}
.nav a{color:white;text-decoration:none;font-weight:bold}

/* BANNER */
.banner img{width:100%}

/* HEADER */
.header{text-align:center;background:#0a1f44;color:white;padding:20px}
.header img{width:80px}

/* VIDEOS */
.videos{display:flex;overflow:auto;gap:10px;padding:10px}
.videos img{width:250px;border-radius:10px}

/* JOB CARD */
.job{background:white;margin:10px;padding:15px;border-radius:10px;box-shadow:0 0 10px #ccc}
.apply{background:green;color:white;padding:10px;text-decoration:none;border-radius:5px;display:inline-block;margin-top:10px}

/* ADMIN */
.admin{display:none;background:#222;color:white;padding:10px;text-align:center}
input,textarea{width:90%;padding:10px;margin:5px}

/* FOOTER */
.footer{background:#111;color:white;text-align:center;padding:20px}

/* WHATSAPP BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a href="#">Home</a>
<a href="#jobs">Latest Jobs</a>
<a href="#videos">Videos</a>
<a href="#contact">Contact</a>
</div>

<!-- BANNER -->
<div class="banner">
<img src="banner.jpg">
</div>

<!-- HEADER -->
<div class="header">
<img src="logo.png">
<h2>SS Solution Services</h2>
<p>Private Job Updates</p>
</div>

<!-- VIDEOS -->
<div id="videos" class="videos">

<a href="https://youtu.be/fksDJpjVM84" target="_blank">
<img src="https://img.youtube.com/vi/fksDJpjVM84/0.jpg">
</a>

<a href="https://youtu.be/XpwsGgZbV_Y" target="_blank">
<img src="https://img.youtube.com/vi/XpwsGgZbV_Y/0.jpg">
</a>

<a href="https://youtu.be/ASoxrra4U9s" target="_blank">
<img src="https://img.youtube.com/vi/ASoxrra4U9s/0.jpg">
</a>

</div>

<!-- JOBS -->
<div id="jobs"></div>

<!-- ADMIN BUTTON -->
<button onclick="showAdmin()" style="position:fixed;top:10px;right:10px;">⚙️</button>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin">
<h3>Admin Panel</h3>

<input type="text" id="title" placeholder="Job Title">
<textarea id="desc" placeholder="Job Details (HTML allowed)"></textarea>

<button onclick="addJob()">Add Job</button>
</div>

<!-- MAP -->
<div style="margin:10px">
<iframe src="https://maps.google.com/maps?q=jaipur&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="250"></iframe>
</div>

<!-- FOOTER -->
<div id="contact" class="footer">
<p>WhatsApp: 8078671637</p>
<p>Email: sssolutionservices999@gmail.com</p>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/918078671637" class="whatsapp">💬</a>

<script>

function showAdmin(){
let pass = prompt("Enter Password");
if(pass=="1234"){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong Password");
}
}

function addJob(){
let title = document.getElementById("title").value;
let desc = document.getElementById("desc").value;

let job = `
<div class="job">
<h3>${title}</h3>
<div>${desc}</div>

<a href="https://wa.me/918078671637" class="apply">Apply Now</a>
<a href="https://form.svhrt.com/681c7ca1cc890b3d79363500" class="apply">Apply Form</a>

</div>
`;

document.getElementById("jobs").insertAdjacentHTML("afterbegin", job);
}

</script>

</body>
</html>
