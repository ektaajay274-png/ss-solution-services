<!DOCTYPE html>
<html>
<head>
<title>SS Solution Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
background:#0a1f44;
color:white;
padding:12px;
position:sticky;top:0;
}
.nav button{
background:none;border:none;color:white;font-size:16px
}

/* SECTIONS */
.section{display:none;padding:10px}
.active{display:block}

/* HEADER */
.header{text-align:center;background:#0a1f44;color:white;padding:15px}
.header img{width:80px}

/* SEARCH */
.search input{width:95%;padding:10px;margin:10px}

/* JOB */
.job{
background:white;margin:10px;padding:15px;border-radius:10px;
box-shadow:0 0 10px #ccc
}

/* BUTTON */
.btn{
background:green;color:white;padding:8px;border-radius:5px;
text-decoration:none;display:inline-block;margin:5px
}

/* VIDEO */
.videos{display:flex;overflow:auto;gap:10px}
.videos img{width:250px;border-radius:10px}

/* ADMIN */
.admin{display:none;background:#222;color:white;padding:10px}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;border-radius:50%
}

/* MARQUEE */
.marquee{background:red;color:white;padding:8px}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('jobs')">Jobs</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('contact')">Contact</button>
</div>

<!-- MARQUEE -->
<div class="marquee">
<marquee>🔥 Latest Jobs Jaipur | Amazon | JCB | Apply Now 🔥</marquee>
</div>

<!-- HOME -->
<div id="home" class="section active">

<div class="header">
<img src="logo.png">
<h2>SS Solution Services</h2>
<p>Private Job Updates</p>
</div>

<img src="banner.jpg" width="100%">

<div class="search">
<input type="text" id="search" placeholder="Search job..." onkeyup="searchJob()">
</div>

<div>
<select onchange="filter(this.value)">
<option value="all">All</option>
<option value="warehouse">Warehouse</option>
<option value="factory">Factory</option>
</select>
</div>

<div id="jobList"></div>

</div>

<!-- JOB PAGE -->
<div id="jobs" class="section">
<h2>All Jobs</h2>
<div id="allJobs"></div>
</div>

<!-- VIDEO PAGE -->
<div id="videos" class="section">
<h2>Videos</h2>
<div id="videoList" class="videos"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact</h2>

<p>📍 Rajasthan Churu Station Road Nayabas Shop No.04</p>

<iframe src="https://maps.google.com/maps?q=churu&t=&z=13&output=embed"
width="100%" height="200"></iframe>

<p>📞 8078671637</p>
<p>📧 sssolutionservices999@gmail.com</p>

</div>

<!-- ADMIN BUTTON -->
<button onclick="login()" style="position:fixed;top:10px;right:10px">⚙️</button>

<!-- ADMIN PANEL -->
<div id="admin" class="admin">

<input id="title" placeholder="Job Title">
<input id="category" placeholder="Category (warehouse/factory)">
<textarea id="desc" placeholder="Job Details"></textarea>
<button onclick="addJob()">Add Job</button>

<input id="video" placeholder="YouTube Link">
<button onclick="addVideo()">Add Video</button>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/918078671637" class="whatsapp">💬</a>

<script>

/* NAVIGATION */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ADMIN LOGIN */
function login(){
let pass=prompt("Enter Password");
if(pass=="1234"){
document.getElementById("admin").style.display="block";
}
}

/* JOB DATA */
let jobs=[];

/* ADD JOB */
function addJob(){
let t=document.getElementById("title").value;
let d=document.getElementById("desc").value;
let c=document.getElementById("category").value;

jobs.push({title:t,desc:d,cat:c});
display();
}

/* DISPLAY JOB */
function display(){
let html="";
jobs.forEach(j=>{
html+=`
<div class="job" data-cat="${j.cat}">
<h3>${j.title}</h3>
<p>${j.desc}</p>

<a href="https://form.svhrt.com/681c7ca1cc890b3d79363500" class="btn">Apply</a>
<a href="https://wa.me/918078671637" class="btn">WhatsApp</a>
</div>
`;
});

document.getElementById("jobList").innerHTML=html;
document.getElementById("allJobs").innerHTML=html;
}

/* SEARCH */
function searchJob(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".job").forEach(j=>{
j.style.display=j.innerText.toLowerCase().includes(val)?"block":"none";
});
}

/* FILTER */
function filter(cat){
document.querySelectorAll(".job").forEach(j=>{
j.style.display=(cat=="all"||j.dataset.cat==cat)?"block":"none";
});
}

/* VIDEO */
function addVideo(){
let link=document.getElementById("video").value;
let id=link.split("v=")[1]||link.split("/").pop();

let html=`<a href="${link}" target="_blank">
<img src="https://img.youtube.com/vi/${id}/0.jpg"></a>`;

document.getElementById("videoList").innerHTML+=html;
}

/* NOTIFICATION */
if(Notification.permission!="granted"){
Notification.requestPermission();
}else{
new Notification("Welcome to SS Jobs 🔥");
}

</script>

</body>
</html>
